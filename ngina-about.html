<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me — Ngina Kamau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --vinyl:      #0A0A0A;
      --vinyl-mid:  #161616;
      --groove:     #1F1F1F;
      --paper:      #F2EBDC;
      --paper2:     #E8DFCB;
      --paper3:     #D9CEBC;
      --ink:        #1A1410;
      --ink2:       #4A3F32;
      --ink3:       #8A7B6A;
      --red:        #9B1D20;
      --red2:       #C42528;
      --cream:      #FAF5EC;
      --gold:       #B8962E;
    }

    html { height: 100%; }

    body {
      font-family: 'Playfair Display', Georgia, serif;
      background: #2A2520;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 60px;
      -webkit-font-smoothing: antialiased;
    }

    .sleeve {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: 600px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 4px 16px rgba(0,0,0,0.5);
    }

    .cover {
      background: var(--vinyl);
      position: relative;
      overflow: hidden;
      min-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .grooves {
      position: absolute;
      inset: 0;
      background: repeating-radial-gradient(
        circle at 42% 58%,
        transparent 0px,
        transparent 6px,
        rgba(255,255,255,0.018) 6px,
        rgba(255,255,255,0.018) 7px
      );
      pointer-events: none;
      z-index: 1;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 42% 58%, transparent 30%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .cover-label-top {
      position: relative;
      z-index: 10;
      padding: 24px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label-logo {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 3px 8px;
    }

    .label-cat {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    .cover-photo-wrap {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 32px;
    }

    .cover-photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      background: var(--vinyl-mid);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
    }

    .cover-photo::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .cover-photo::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .cover-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .upload-icon { opacity: 0.2; }

    .upload-hint {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      line-height: 1.6;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .cover-text {
      position: relative;
      z-index: 10;
      padding: 0 28px 28px;
    }

    .cover-artist {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-family: 'Space Mono', monospace;
      margin-bottom: 8px;
    }

    .cover-title {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.0;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .cover-title em {
      font-style: italic;
      color: var(--red2);
    }

    .cover-genre-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .genre-tag {
      font-family: 'Space Mono', monospace;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(184,150,46,0.4);
      padding: 3px 8px;
    }

    .cover-year {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
    }
